  importData:function(){
    var input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=function(e){
      var file=e.target.files[0];if(!file)return;var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var d=JSON.parse(ev.target.result);
          if(d.classes){
            classes=d.classes;currentClassId=d.currentClassId||'';
            if(d.schoolName) schoolName=d.schoolName;
            ensureDefaultClass();
          }else{
            if(d.children)children=d.children;for(var ii=0;ii<children.length;ii++){children[ii]=children[ii].toUpperCase();}
            if(d.dateData)dateData=d.dateData;else if(d.presenze||d.pre||d.post){var key=getCurrentDateKey();dateData[key]={presenze:d.presenze||{},pre:d.pre||{},post:d.post||{}};}
            if(d.childDiets)childDiets=d.childDiets;
            if(d.className)className=d.className;
            if(d.childGender)childGender=d.childGender;
            if(d.childDeleghe)childDeleghe=d.childDeleghe;
            if(d.childContatti)childContatti=d.childContatti;
            if(d.childAge)childAge=d.childAge;
            if(d.childNotes)childNotes=d.childNotes;
            ensureDefaultClass();
          }
          var ckey=getCurrentDateKey();var dd=dateData[ckey];if(dd){presenze=dd.presenze||{};pre=dd.pre||{};post=dd.post||{};}else{presenze={};pre={};post={};}
          saveState();render();alert('Dati importati con successo!');
        }catch(err){alert('File non valido.');}
      };reader.readAsText(file);
    };input.click();
  },

  var isFlying=false;

  function getRestPos(){
    var dateEl=document.getElementById('headerClockDate');
    if(dateEl){
      var r=dateEl.getBoundingClientRect();
      var text=String(dateEl.textContent||'');
      var yearPos=text.lastIndexOf('2026');
      var offset=yearPos>=0?(yearPos+2)/text.length:0.65;
      var legY=r.top+r.height*0.55;
      var sixX=r.left+r.width*offset;
      var legOff=74/96*80;

    }

    if(icon){
      var r2=icon.getBoundingClientRect();

    }

  }

  function restOnDate(){
    if(flyAnimId){cancelAnimationFrame(flyAnimId);flyAnimId=null;}

  function startFlying(){
    if(isFlying) return;
    isFlying=true;
    setSvg();
    var curX=parseInt(bfly.style.left)||80;
    var curY=parseInt(bfly.style.top)||40;
    bfly.style.animation='none';
    bfly.style.transform='rotate(-3deg)';
    bfly.style.left=curX+'px';
    bfly.style.top=curY+'px';
    bfly.className='bfly flying';
    bfly.style.transition='';
    var svgEl=bfly.querySelector('svg');
    if(svgEl){svgEl.style.transform='';svgEl.style.filter='';svgEl.style.transformOrigin='center center';}

    requestAnimationFrame(function(){
      var w=window.innerWidth;
      var h=window.innerHeight;
      var startX=curX;
      var startY=curY;
      var takeoffDur=3000;
      var flyDur=10000;
      var landDur=2500;
      var totalDuration=takeoffDur+flyDur+landDur;
      var startTime=performance.now();
      var restPos=getRestPos();

      var driftX=Math.min(w*0.3,120);
      var driftY=-12;

      var p0={x:startX+driftX,y:startY+driftY};
      var p1={x:Math.random()*w*0.4+w*0.5,y:Math.random()*h*0.3+h*0.05};
      var p2={x:Math.random()*w*0.3+w*0.05,y:Math.random()*h*0.3+h*0.15};
      var p3={x:Math.random()*w*0.4+w*0.3,y:Math.random()*h*0.3+h*0.25};

      var p5={x:restPos.x,y:restPos.y};

      function easeInOut(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
      function easeOut(t){return 1-Math.pow(1-t,3);}
      function easeIn(t){return t*t*t;}

      function bezierPoint(t,pts){
        var n=pts.length-1;
        var seg=Math.min(Math.floor(t*n),n-1);

        var a=pts[seg],b=pts[seg+1];
        var cpx1=a.x+(b.x-a.x)*0.5,cpy1=a.y+(b.y-a.y)*0.5-60;

        };

        var elapsed=now-startTime;

        var isTakeoff=elapsed<takeoffDur;

        if(isTakeoff){
          var tt=Math.min(elapsed/takeoffDur,1);
          var et=easeIn(tt);
          var moveX=driftX*et;
          var moveY=driftY*et;
          var waveX=Math.sin(tt*Math.PI*3)*8*et;
          var waveY=Math.cos(tt*Math.PI*2)*5*et;

          bfly.style.left=(startX+moveX+waveX)+'px';
          bfly.style.top=(startY+moveY+waveY)+'px';

          var curRot=-3*(1-et)+5*et;
          bfly.style.transform='rotate('+curRot+'deg)';

          if(svgEl){
            var flutterSpeed=0.003+0.005*et;
            var flutterAmp=0.1+0.6*et;
            var flutter=Math.sin(now*flutterSpeed);
            svgEl.style.transform='scaleX('+(1-flutterAmp*Math.abs(flutter))+')';

          var pos=bezierPoint(et,pts);

          bfly.style.top=(pos.y+waveY)+'px';

          var nextT=Math.min(ft+0.01,1);
          var nextPos=bezierPoint(easeInOut(nextT),pts);
          var dx=nextPos.x-pos.x,dy=nextPos.y-pos.y;
          var angle=Math.atan2(dy,dx)*180/Math.PI;
          bfly.style.transform='rotate('+(angle*0.15)+'deg)';

          if(svgEl){
            var flutter=Math.sin(now*0.008);

            var colorFade=colorAngle*(1-elt);

        }

        } else {

        }
      }

      flyAnimId=requestAnimationFrame(animate);
    });
  }

      var r=dateEl.getBoundingClientRect();
      el.style.left=(r.right-48)+'px';
      el.style.top=(r.bottom+2)+'px';
      el.style.animation='swingBoth 3.2s ease-in-out infinite';
      return;

    var wr=weatherEl.getBoundingClientRect();

    el.style.top=(wr.bottom+2)+'px';
    el.style.animation='swingBoth 3.2s ease-in-out infinite';

})();

// ---- STELLINE CADENTI NELL'HEADER ----
(function(){
  var starSymbols=['✦','✧','✶','⋆','★','☆'];
  var colors=['#ffd700','#ffec8b','#ffa500','#fff8dc','#ffe4b5','#fffacd','#ffe066'];

  function addStarsToHeader(){
    var header=document.querySelector('.header');
    if(!header) return;
    // Rimuovi stelline vecchie se ci sono
    header.querySelectorAll('.falling-star').forEach(function(s){s.remove();});
    // Calcola l'altezza dell'header per la caduta
    var hHeight=header.offsetHeight||200;
    // Crea 15-20 stelline
    var count=15+Math.floor(Math.random()*6);
    for(var i=0;i<count;i++){
      var star=document.createElement('span');
      star.className='falling-star';
      star.textContent=starSymbols[Math.floor(Math.random()*starSymbols.length)];
      var x=Math.random()*95; // 0-95% per non uscire dal bordo
      var size=10+Math.random()*12; // 10-22px
      var dur=7+Math.random()*9; // 7-16s (più lento)
      var delay=Math.random()*8; // 0-8s ritardo
      var color=colors[Math.floor(Math.random()*colors.length)];
      // Calcola distanze di caduta in pixel basate sull'altezza dell'header
      var midPx=Math.round(hHeight*0.4+Math.random()*hHeight*0.2);
      var farPx=Math.round(hHeight*0.6+Math.random()*hHeight*0.2);
      var endPx=Math.round(hHeight*0.85+Math.random()*hHeight*0.15);
      star.style.left=x+'%';
      star.style.top='0px';
      star.style.color=color;
      star.style.setProperty('--star-size',size+'px');
      star.style.setProperty('--star-dur',dur+'s');
      star.style.setProperty('--star-delay',delay+'s');
      star.style.setProperty('--star-glow',color);
      star.style.setProperty('--star-mid',midPx+'px');
      star.style.setProperty('--star-far',farPx+'px');
      star.style.setProperty('--star-end',endPx+'px');
      header.appendChild(star);
    }
  }

  // Aggiungi stelline quando la pagina si carica e dopo ogni render
  setTimeout(addStarsToHeader,600);
  var origRender=window.render;
  if(origRender){
    window.render=function(){
      origRender.apply(this,arguments);
      setTimeout(addStarsToHeader,150);
    };
  }
  // Ri-aggiungi stelline se la finestra viene ridimensionata (l'header cambia altezza)
  window.addEventListener('resize',function(){
    clearTimeout(window._starResizeTimer);
    window._starResizeTimer=setTimeout(addStarsToHeader,300);
  });
})();

// Animazione class-tabs: setInterval modifica direttamente gli stili (come il clock)
// Nessun CSS animation/keyframe/transition — solo JS diretto sul DOM
(function(){
  var _tabAnimPhase=0;
  setInterval(function(){
    var tabs=document.querySelectorAll('.class-tabs .class-tab');
    if(!tabs||tabs.length===0) return;
    _tabAnimPhase++;
    for(var i=0;i<tabs.length;i++){
      var offset=i*0.5;
      var t=((_tabAnimPhase*0.08)+offset)%6.2832; // 2*PI
      var s=1+0.04*Math.sin(t); // scale da 0.96 a 1.04
      var y=Math.sin(t)*2;      // translateY da -2px a +2px
      tabs[i].style.transform='scale('+s.toFixed(3)+') translateY('+y.toFixed(1)+'px)';
    }
  },50);
})();

// Arcobaleno animato: attraversa l'header in diagonale da sinistra a destra, poi scompare, poi riappare
(function(){
  var _rbPhase=0;
  var _rbCycleDuration=540; // frames per ciclo completo (~27 secondi a 50ms)
  var _rbCrossFrames=340;   // frames per attraversare da sinistra a destra (~17 secondi)
  // _rbHiddenFrames = 540-340 = 200 frames nascosto (~10 secondi di pausa)
  setInterval(function(){
    var outer=document.getElementById('headerRainbow');
    var inner=document.getElementById('headerRainbowInner');
    if(!outer||!inner) return;
    _rbPhase=(_rbPhase+1)%_rbCycleDuration;
    var opacity=0;
    var xPos=-120;
    
    if(_rbPhase<_rbCrossFrames){
      // Attraversa veloce da sinistra a destra
      var progress=_rbPhase/_rbCrossFrames;
      xPos=-120+progress*240;
      // Fade in/out breve ai bordi
      if(progress<0.1){
        opacity=0.85*(progress/0.1);
      } else if(progress>0.9){
        opacity=0.85*(1-(progress-0.9)/0.1);
      } else {
        opacity=0.85;
      }
    } else {
      opacity=0;
      xPos=120;
    }
    
    outer.style.opacity=opacity.toFixed(3);
    inner.style.transform='rotate(-30deg) translateX('+xPos.toFixed(1)+'%)';
    inner.style.webkitTransform='rotate(-30deg) translateX('+xPos.toFixed(1)+'%)';
  },50);
})();

})();
